<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  
  <!-- Title -->
  <text x="200" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1f2937">Privacy Garden</text>
  
  <!-- Garden Ground -->
  <path d="M 0 220 Q 100 200 200 220 Q 300 240 400 220 L 400 300 L 0 300 Z" fill="none" stroke="#1f2937" stroke-width="2"/>
  
  <!-- Trees -->
  <path d="M 80 220 L 80 180 Q 60 160 80 140 Q 100 160 80 180" fill="none" stroke="#1f2937" stroke-width="2"/>
  <path d="M 320 220 L 320 180 Q 300 160 320 140 Q 340 160 320 180" fill="none" stroke="#1f2937" stroke-width="2"/>
  
  <!-- Flowers -->
  <g transform="translate(120, 200)">
    <circle cx="0" cy="0" r="8" fill="none" stroke="#1f2937" stroke-width="2"/>
    <path d="M -8 0 L 8 0 M 0 -8 L 0 8 M -6 -6 L 6 6 M -6 6 L 6 -6" fill="none" stroke="#1f2937" stroke-width="1"/>
  </g>
  <g transform="translate(180, 190)">
    <circle cx="0" cy="0" r="8" fill="none" stroke="#1f2937" stroke-width="2"/>
    <path d="M -8 0 L 8 0 M 0 -8 L 0 8 M -6 -6 L 6 6 M -6 6 L 6 -6" fill="none" stroke="#1f2937" stroke-width="1"/>
  </g>
  <g transform="translate(240, 200)">
    <circle cx="0" cy="0" r="8" fill="none" stroke="#1f2937" stroke-width="2"/>
    <path d="M -8 0 L 8 0 M 0 -8 L 0 8 M -6 -6 L 6 6 M -6 6 L 6 -6" fill="none" stroke="#1f2937" stroke-width="1"/>
  </g>
  <g transform="translate(280, 190)">
    <circle cx="0" cy="0" r="8" fill="none" stroke="#1f2937" stroke-width="2"/>
    <path d="M -8 0 L 8 0 M 0 -8 L 0 8 M -6 -6 L 6 6 M -6 6 L 6 -6" fill="none" stroke="#1f2937" stroke-width="1"/>
  </g>
  
  <!-- Privacy Panda -->
  <circle cx="200" cy="160" r="25" fill="none" stroke="#1f2937" stroke-width="2"/>
  <circle cx="190" cy="150" r="6" fill="none" stroke="#1f2937" stroke-width="1"/>
  <circle cx="210" cy="150" r="6" fill="none" stroke="#1f2937" stroke-width="1"/>
  <ellipse cx="200" cy="165" rx="4" ry="3" fill="none" stroke="#1f2937" stroke-width="1"/>
  <path d="M 195 170 Q 200 175 205 170" fill="none" stroke="#1f2937" stroke-width="1"/>
  
  <!-- Privacy Shield -->
  <path d="M 200 120 L 180 140 L 200 180 L 220 140 Z" fill="none" stroke="#1f2937" stroke-width="2"/>
  <circle cx="200" cy="150" r="8" fill="none" stroke="#1f2937" stroke-width="1"/>
  
  <!-- Garden Fence -->
  <rect x="50" y="200" width="300" height="20" fill="none" stroke="#1f2937" stroke-width="2"/>
  <rect x="60" y="180" width="5" height="40" fill="none" stroke="#1f2937" stroke-width="1"/>
  <rect x="120" y="180" width="5" height="40" fill="none" stroke="#1f2937" stroke-width="1"/>
  <rect x="180" y="180" width="5" height="40" fill="none" stroke="#1f2937" stroke-width="1"/>
  <rect x="240" y="180" width="5" height="40" fill="none" stroke="#1f2937" stroke-width="1"/>
  <rect x="300" y="180" width="5" height="40" fill="none" stroke="#1f2937" stroke-width="1"/>
  <rect x="335" y="180" width="5" height="40" fill="none" stroke="#1f2937" stroke-width="1"/>
  
  <!-- Decorative Elements -->
  <circle cx="100" cy="100" r="3" fill="none" stroke="#1f2937" stroke-width="1"/>
  <circle cx="300" cy="100" r="3" fill="none" stroke="#1f2937" stroke-width="1"/>
  <circle cx="100" cy="250" r="3" fill="none" stroke="#1f2937" stroke-width="1"/>
  <circle cx="300" cy="250" r="3" fill="none" stroke="#1f2937" stroke-width="1"/>
  
  <!-- Instructions -->
  <text x="200" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">Beautiful garden scene with privacy-themed elements!</text>
