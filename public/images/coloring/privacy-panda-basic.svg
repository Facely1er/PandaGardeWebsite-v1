<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  
  <!-- Title -->
  <text x="200" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1f2937">Privacy Panda - Basic</text>
  
  <!-- Panda Head -->
  <circle cx="200" cy="120" r="45" fill="none" stroke="#1f2937" stroke-width="3"/>
  
  <!-- Panda Ears -->
  <circle cx="170" cy="80" r="20" fill="none" stroke="#1f2937" stroke-width="3"/>
  <circle cx="230" cy="80" r="20" fill="none" stroke="#1f2937" stroke-width="3"/>
  
  <!-- Panda Eyes -->
  <circle cx="185" cy="110" r="8" fill="none" stroke="#1f2937" stroke-width="2"/>
  <circle cx="215" cy="110" r="8" fill="none" stroke="#1f2937" stroke-width="2"/>
  
  <!-- Panda Nose -->
  <ellipse cx="200" cy="125" rx="6" ry="4" fill="none" stroke="#1f2937" stroke-width="2"/>
  
  <!-- Panda Mouth -->
  <path d="M 195 135 Q 200 145 205 135" fill="none" stroke="#1f2937" stroke-width="2"/>
  
  <!-- Privacy Shield -->
  <path d="M 200 180 L 160 200 L 200 250 L 240 200 Z" fill="none" stroke="#1f2937" stroke-width="3"/>
  <path d="M 200 190 L 170 205 L 200 240 L 230 205 Z" fill="none" stroke="#1f2937" stroke-width="2"/>
  
  <!-- Shield Details -->
  <circle cx="200" cy="210" r="15" fill="none" stroke="#1f2937" stroke-width="2"/>
  <path d="M 195 210 L 200 215 L 205 210" fill="none" stroke="#1f2937" stroke-width="2"/>
  
  <!-- Decorative Elements -->
  <circle cx="100" cy="100" r="3" fill="none" stroke="#1f2937" stroke-width="1"/>
  <circle cx="300" cy="100" r="3" fill="none" stroke="#1f2937" stroke-width="1"/>
  <circle cx="100" cy="200" r="3" fill="none" stroke="#1f2937" stroke-width="1"/>
  <circle cx="300" cy="200" r="3" fill="none" stroke="#1f2937" stroke-width="1"/>
  
  <!-- Instructions -->
  <text x="200" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">Color Privacy Panda and his protection shield!</text>
</svg>