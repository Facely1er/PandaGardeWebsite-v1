<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  
  <!-- Title -->
  <text x="200" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1f2937">Password Treasure Chest</text>
  
  <!-- Treasure Chest Base -->
  <rect x="120" y="180" width="160" height="60" rx="10" fill="none" stroke="#1f2937" stroke-width="3"/>
  
  <!-- Treasure Chest Lid -->
  <path d="M 120 180 Q 200 140 280 180" fill="none" stroke="#1f2937" stroke-width="3"/>
  
  <!-- Lock -->
  <rect x="190" y="160" width="20" height="25" rx="3" fill="none" stroke="#1f2937" stroke-width="2"/>
  <path d="M 195 160 Q 200 155 205 160" fill="none" stroke="#1f2937" stroke-width="2"/>
  
  <!-- Keyhole -->
  <circle cx="200" cy="170" r="3" fill="none" stroke="#1f2937" stroke-width="1"/>
  <rect x="198" y="170" width="4" height="8" fill="none" stroke="#1f2937" stroke-width="1"/>
  
  <!-- Treasure -->
  <circle cx="150" cy="200" r="8" fill="none" stroke="#1f2937" stroke-width="2"/>
  <circle cx="180" cy="195" r="6" fill="none" stroke="#1f2937" stroke-width="2"/>
  <circle cx="220" cy="200" r="7" fill="none" stroke="#1f2937" stroke-width="2"/>
  <circle cx="250" cy="195" r="5" fill="none" stroke="#1f2937" stroke-width="2"/>
  
  <!-- Coins -->
  <circle cx="160" cy="210" r="4" fill="none" stroke="#1f2937" stroke-width="1"/>
  <circle cx="190" cy="215" r="4" fill="none" stroke="#1f2937" stroke-width="1"/>
  <circle cx="220" cy="210" r="4" fill="none" stroke="#1f2937" stroke-width="1"/>
  <circle cx="240" cy="215" r="4" fill="none" stroke="#1f2937" stroke-width="1"/>
  
  <!-- Decorative Elements -->
  <path d="M 100 100 Q 120 80 140 100" fill="none" stroke="#1f2937" stroke-width="2"/>
  <path d="M 260 100 Q 280 80 300 100" fill="none" stroke="#1f2937" stroke-width="2"/>
  
  <!-- Stars -->
  <g transform="translate(80, 120)">
    <path d="M 0 -8 L 2 -2 L 8 0 L 2 2 L 0 8 L -2 2 L -8 0 L -2 -2 Z" fill="none" stroke="#1f2937" stroke-width="1"/>
  </g>
  <g transform="translate(320, 120)">
    <path d="M 0 -8 L 2 -2 L 8 0 L 2 2 L 0 8 L -2 2 L -8 0 L -2 -2 Z" fill="none" stroke="#1f2937" stroke-width="1"/>
  </g>
  
  <!-- Instructions -->
  <text x="200" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">Color the treasure chest that keeps passwords safe!</text>
</svg>