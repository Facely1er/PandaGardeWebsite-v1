<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  
  <!-- Title -->
  <text x="200" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1f2937">Privacy Shield</text>
  
  <!-- Main Shield -->
  <path d="M 200 60 L 140 100 L 140 180 L 200 240 L 260 180 L 260 100 Z" fill="none" stroke="#1f2937" stroke-width="4"/>
  
  <!-- Inner Shield Design -->
  <path d="M 200 80 L 160 110 L 160 170 L 200 220 L 240 170 L 240 110 Z" fill="none" stroke="#1f2937" stroke-width="2"/>
  
  <!-- Shield Center -->
  <circle cx="200" cy="140" r="30" fill="none" stroke="#1f2937" stroke-width="3"/>
  
  <!-- Lock Symbol -->
  <rect x="190" y="130" width="20" height="15" rx="3" fill="none" stroke="#1f2937" stroke-width="2"/>
  <path d="M 195 130 Q 200 125 205 130" fill="none" stroke="#1f2937" stroke-width="2"/>
  
  <!-- Decorative Stars -->
  <g transform="translate(120, 80)">
    <path d="M 0 -10 L 3 -3 L 10 0 L 3 3 L 0 10 L -3 3 L -10 0 L -3 -3 Z" fill="none" stroke="#1f2937" stroke-width="1"/>
  </g>
  <g transform="translate(280, 80)">
    <path d="M 0 -10 L 3 -3 L 10 0 L 3 3 L 0 10 L -3 3 L -10 0 L -3 -3 Z" fill="none" stroke="#1f2937" stroke-width="1"/>
  </g>
  <g transform="translate(120, 200)">
    <path d="M 0 -10 L 3 -3 L 10 0 L 3 3 L 0 10 L -3 3 L -10 0 L -3 -3 Z" fill="none" stroke="#1f2937" stroke-width="1"/>
  </g>
  <g transform="translate(280, 200)">
    <path d="M 0 -10 L 3 -3 L 10 0 L 3 3 L 0 10 L -3 3 L -10 0 L -3 -3 Z" fill="none" stroke="#1f2937" stroke-width="1"/>
  </g>
  
  <!-- Border Pattern -->
  <circle cx="200" cy="100" r="2" fill="none" stroke="#1f2937" stroke-width="1"/>
  <circle cx="200" cy="180" r="2" fill="none" stroke="#1f2937" stroke-width="1"/>
  <circle cx="160" cy="140" r="2" fill="none" stroke="#1f2937" stroke-width="1"/>
  <circle cx="240" cy="140" r="2" fill="none" stroke="#1f2937" stroke-width="1"/>
  
  <!-- Instructions -->
  <text x="200" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">Design your own privacy protection shield!</text>
</svg>