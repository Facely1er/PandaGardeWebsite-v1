[build]
  publish = "dist"
  command = "npm run build:family-hub"

[build.environment]
  NODE_VERSION = "18"

# SPA fallback - redirect all routes to family-hub.html
[[redirects]]
  from = "/*"
  to = "/family-hub.html"
  status = 200

# Enhanced Security headers for Family Hub (stricter than main site)
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent MIME type sniffing
    X-Content-Type-Options = "nosniff"
    
    # Prevent clickjacking - DENY all framing
    X-Frame-Options = "DENY"
    
    # XSS Protection
    X-XSS-Protection = "1; mode=block"
    
    # Referrer policy - strict
    Referrer-Policy = "strict-origin-when-cross-origin"
    
    # Force HTTPS for 1 year (longer than main site)
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    
    # Enhanced Content Security Policy (stricter than main site)
    # No 'unsafe-inline' or 'unsafe-eval' for scripts
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://*.sentry.io; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co https://*.sentry.io; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests; block-all-mixed-content"
    
    # Permissions Policy (formerly Feature Policy)
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()"
    
    # Cross-Origin policies
    Cross-Origin-Embedder-Policy = "require-corp"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"
    
    # Additional security headers
    X-DNS-Prefetch-Control = "off"
    X-Download-Options = "noopen"
    X-Permitted-Cross-Domain-Policies = "none"
    
    # Cache control for sensitive pages
    Cache-Control = "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0"

# Service Worker headers
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"
    Content-Security-Policy = "default-src 'self'"

# Manifest file headers
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
    X-Content-Type-Options = "nosniff"

# Static assets headers
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
    X-Content-Type-Options = "nosniff"

# API routes (if any) - even stricter
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Content-Security-Policy = "default-src 'none'"

